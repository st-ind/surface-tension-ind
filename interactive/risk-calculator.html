<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Risk Calculator · Challenge 10%</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0D0F0C; }
  button { font-family: inherit; cursor: pointer; background: none; border: none; padding: 0; margin: 0; color: inherit; }
  input { font-family: inherit; }
  input[type=number]::-webkit-inner-spin-button { opacity: 1; }

  /* minimal utility set — replaces the Tailwind CDN (no build step needed) */
  .flex { display: flex; }
  .flex-1 { flex: 1 1 0%; }
  .flex-col { flex-direction: column; }
  .flex-shrink-0 { flex-shrink: 0; }
  .font-bold { font-weight: 700; }
  .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .font-semibold { font-weight: 600; }
  .gap-1 { gap: 0.25rem; }
  .gap-2 { gap: 0.5rem; }
  .gap-3 { gap: 0.75rem; }
  .grid { display: grid; }
  .grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .h-1\.5 { height: 0.375rem; }
  .h-2 { height: 0.5rem; }
  .h-3 { height: 0.75rem; }
  .h-9 { height: 2.25rem; }
  .h-full { height: 100%; }
  .items-baseline { align-items: baseline; }
  .items-center { align-items: center; }
  .items-end { align-items: flex-end; }
  .justify-between { justify-content: space-between; }
  .justify-center { justify-content: center; }
  .justify-end { justify-content: flex-end; }
  .max-h-64 { max-height: 16rem; }
  .max-w-md { max-width: 28rem; }
  .min-h-screen { min-height: 100vh; }
  .outline-none { outline: none; }
  .overflow-x-auto { overflow-x: auto; }
  .overflow-y-auto { overflow-y: auto; }
  .p-2 { padding: 0.5rem; }
  .p-3 { padding: 0.75rem; }
  .px-2 { padding-left: 0.5rem; padding-right: 0.5rem; }
  .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
  .py-1 { padding-top: 0.25rem; padding-bottom: 0.25rem; }
  .py-1\.5 { padding-top: 0.375rem; padding-bottom: 0.375rem; }
  .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
  .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
  .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
  .relative { position: relative; }
  .text-2xl { font-size: 1.5rem; line-height: 2rem; }
  .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
  .text-base { font-size: 1rem; line-height: 1.5rem; }
  .text-center { text-align: center; }
  .text-lg { font-size: 1.125rem; line-height: 1.75rem; }
  .text-right { text-align: right; }
  .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
  .text-xs { font-size: 0.75rem; line-height: 1rem; }
  .tracking-wide { letter-spacing: 0.025em; }
  .tracking-widest { letter-spacing: 0.1em; }
  .uppercase { text-transform: uppercase; }
  .w-3 { width: 0.75rem; }
  .w-7 { width: 1.75rem; }
  .w-full { width: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo } = React;

// ---- palette tokens (ledger / DOM-ladder, not default tailwind colors) ----
const C = {
  base: "#0D0F0C",
  panel: "#15170F",
  panel2: "#1B1E13",
  line: "#2A2E1F",
  ink: "#E8E6D9",
  inkMute: "#8C8F7A",
  profit: "#9FD356",
  profitDim: "#3E4A28",
  loss: "#D9624F",
  lossDim: "#4A2B24",
  heat: "#E0A23A",
  heatDim: "#4A3A1C",
};

const fmt = (n) =>
  n.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 2 });

const fmtPct = (n) => `${n.toFixed(2)}%`;

const DEFAULTS = {
  startBalance: 25000,
  targetPct: 10,
  baseRiskPct: 1,
  escalatedRiskPct: 1.5,
  maxRiskPct: 2.5,
  streakThreshold: 3,
  rrMultiple: 2,
  maxDailyLossPct: 4,
};

function RiskCalculator() {
  const [settings, setSettings] = useState(DEFAULTS);
  const [draft, setDraft] = useState(DEFAULTS);
  const [showSettings, setShowSettings] = useState(true);

  const [balance, setBalance] = useState(DEFAULTS.startBalance);
  const [winStreak, setWinStreak] = useState(0);
  const [history, setHistory] = useState([]); // {n, result, riskPct, riskAmt, pnl, balanceAfter, prevBalance, prevStreak}
  const [day, setDay] = useState(1);
  const [dailyStartBalance, setDailyStartBalance] = useState(DEFAULTS.startBalance);

  const dailyPnl = balance - dailyStartBalance;
  const dailyLossPct = dailyStartBalance > 0 ? Math.max(0, -dailyPnl / dailyStartBalance) * 100 : 0;
  const locked = dailyLossPct >= settings.maxDailyLossPct;

  const escalated = winStreak >= settings.streakThreshold;
  const currentRiskPct = Math.min(
    escalated ? settings.escalatedRiskPct : settings.baseRiskPct,
    settings.maxRiskPct
  );
  const currentRiskAmt = (balance * currentRiskPct) / 100;

  const targetAmount = settings.startBalance * (1 + settings.targetPct / 100);
  const distanceTotal = targetAmount - settings.startBalance;
  const distanceDone = balance - settings.startBalance;
  const progressPct = Math.max(0, Math.min(100, (distanceDone / distanceTotal) * 100));
  const goalReached = balance >= targetAmount;

  const logTrade = (isWin) => {
    if (locked) return;
    const prevBalance = balance;
    const prevStreak = winStreak;
    const pnl = isWin ? currentRiskAmt * settings.rrMultiple : -currentRiskAmt;
    const newBalance = prevBalance + pnl;
    const newStreak = isWin ? prevStreak + 1 : 0;

    setHistory((h) => [
      {
        n: h.length + 1,
        result: isWin ? "W" : "L",
        riskPct: currentRiskPct,
        riskAmt: currentRiskAmt,
        pnl,
        balanceAfter: newBalance,
        prevBalance,
        prevStreak,
      },
      ...h,
    ]);
    setBalance(newBalance);
    setWinStreak(newStreak);
  };

  const undoLast = () => {
    if (history.length === 0) return;
    const [last, ...rest] = history;
    setBalance(last.prevBalance);
    setWinStreak(last.prevStreak);
    setHistory(rest);
  };

  const resetProgress = () => {
    setBalance(settings.startBalance);
    setWinStreak(0);
    setHistory([]);
    setDay(1);
    setDailyStartBalance(settings.startBalance);
  };

  const newDay = () => {
    setDay((d) => d + 1);
    setDailyStartBalance(balance);
  };

  const applySettings = () => {
    const clean = {
      startBalance: Number(draft.startBalance) || DEFAULTS.startBalance,
      targetPct: Number(draft.targetPct) || DEFAULTS.targetPct,
      baseRiskPct: Number(draft.baseRiskPct) || DEFAULTS.baseRiskPct,
      escalatedRiskPct: Number(draft.escalatedRiskPct) || DEFAULTS.escalatedRiskPct,
      maxRiskPct: Number(draft.maxRiskPct) || DEFAULTS.maxRiskPct,
      streakThreshold: Math.max(1, Number(draft.streakThreshold) || DEFAULTS.streakThreshold),
      rrMultiple: Number(draft.rrMultiple) || DEFAULTS.rrMultiple,
      maxDailyLossPct: Number(draft.maxDailyLossPct) || DEFAULTS.maxDailyLossPct,
    };
    setSettings(clean);
    setBalance(clean.startBalance);
    setWinStreak(0);
    setHistory([]);
    setDay(1);
    setDailyStartBalance(clean.startBalance);
  };

  const tape = useMemo(() => [...history].reverse(), [history]);

  const stats = useMemo(() => {
    const total = history.length;
    const wins = history.filter((t) => t.result === "W").length;
    const winRate = total > 0 ? (wins / total) * 100 : 0;
    const totalPnl = balance - settings.startBalance;
    const expectancy = total > 0 ? totalPnl / total : 0;
    const tradesPerDay = total > 0 ? total / day : 0;
    const remaining = targetAmount - balance;

    let forecast;
    if (balance >= targetAmount) {
      forecast = "цель достигнута";
    } else if (total === 0) {
      forecast = "нужна хотя бы 1 сделка";
    } else if (expectancy <= 0) {
      forecast = "мат. ожидание ≤ 0 — не наберёт";
    } else {
      const tradesLeft = remaining / expectancy;
      const daysLeft = tradesLeft / tradesPerDay;
      forecast = `~${Math.ceil(tradesLeft)} сделок · ~${daysLeft.toFixed(1)} дн.`;
    }

    return { total, wins, winRate, expectancy, tradesPerDay, forecast };
  }, [history, balance, settings.startBalance, day, targetAmount]);

  const Field = ({ label, value, onChange, step = "0.1" }) => (
    <label className="flex flex-col gap-1">
      <span className="text-xs uppercase tracking-widest" style={{ color: C.inkMute }}>
        {label}
      </span>
      <input
        type="number"
        step={step}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        className="font-mono text-sm px-2 py-1.5 outline-none"
        style={{
          background: C.panel2,
          border: `1px solid ${C.line}`,
          color: C.ink,
          borderRadius: 2,
        }}
      />
    </label>
  );

  return (
    <div
      className="w-full min-h-screen flex justify-center"
      style={{ background: C.base, color: C.ink, fontFamily: "ui-monospace, SFMono-Regular, monospace" }}
    >
      <div className="w-full max-w-md px-3 py-4 flex flex-col gap-3">
        {/* HEADER */}
        <div className="flex items-center justify-between">
          <div>
            <div className="text-xs uppercase tracking-widest" style={{ color: C.inkMute }}>
              Risk Calculator
            </div>
            <div className="text-base font-semibold">Challenge {settings.targetPct}%</div>
          </div>
          <button
            onClick={() => setShowSettings((s) => !s)}
            className="flex items-center gap-1 text-xs px-2 py-1.5"
            style={{ border: `1px solid ${C.line}`, color: C.inkMute, borderRadius: 2 }}
          >
            <span>⚙</span>
            <span>{showSettings ? "⌃" : "⌄"}</span>
          </button>
        </div>

        {/* SETTINGS */}
        {showSettings && (
          <div
            className="flex flex-col gap-3 p-3"
            style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 2 }}
          >
            <div className="grid grid-cols-2 gap-2">
              <Field
                label="Старт. баланс"
                value={draft.startBalance}
                onChange={(v) => setDraft((d) => ({ ...d, startBalance: v }))}
                step="100"
              />
              <Field
                label="Цель, %"
                value={draft.targetPct}
                onChange={(v) => setDraft((d) => ({ ...d, targetPct: v }))}
              />
              <Field
                label="База риска, %"
                value={draft.baseRiskPct}
                onChange={(v) => setDraft((d) => ({ ...d, baseRiskPct: v }))}
              />
              <Field
                label="RR (1:X)"
                value={draft.rrMultiple}
                onChange={(v) => setDraft((d) => ({ ...d, rrMultiple: v }))}
              />
              <Field
                label="Серия побед →"
                value={draft.streakThreshold}
                onChange={(v) => setDraft((d) => ({ ...d, streakThreshold: v }))}
                step="1"
              />
              <Field
                label="Риск разгона, %"
                value={draft.escalatedRiskPct}
                onChange={(v) => setDraft((d) => ({ ...d, escalatedRiskPct: v }))}
              />
              <Field
                label="Потолок риска, %"
                value={draft.maxRiskPct}
                onChange={(v) => setDraft((d) => ({ ...d, maxRiskPct: v }))}
              />
              <Field
                label="Дн. лимит просадки, %"
                value={draft.maxDailyLossPct}
                onChange={(v) => setDraft((d) => ({ ...d, maxDailyLossPct: v }))}
              />
            </div>
            <button
              onClick={applySettings}
              className="text-xs uppercase tracking-widest py-2"
              style={{ background: C.heatDim, color: C.heat, border: `1px solid ${C.heat}`, borderRadius: 2 }}
            >
              Применить настройки (сброс прогресса)
            </button>
          </div>
        )}

        {/* BALANCE / PROGRESS */}
        <div
          className="flex flex-col gap-2 p-3"
          style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 2 }}
        >
          <div className="flex items-end justify-between">
            <div>
              <div className="text-xs uppercase tracking-widest" style={{ color: C.inkMute }}>
                Баланс
              </div>
              <div className="text-2xl font-semibold">{fmt(balance)}</div>
            </div>
            <div className="text-right">
              <div className="text-xs uppercase tracking-widest flex items-center gap-1 justify-end" style={{ color: C.inkMute }}>
                <span>🎯 Цель</span>
              </div>
              <div className="text-sm" style={{ color: C.profit }}>
                {fmt(targetAmount)}
              </div>
            </div>
          </div>
          <div className="h-2 w-full relative" style={{ background: C.panel2, border: `1px solid ${C.line}` }}>
            <div
              className="h-full"
              style={{ width: `${progressPct}%`, background: goalReached ? C.profit : C.heat }}
            />
          </div>
          <div className="flex justify-between text-xs" style={{ color: C.inkMute }}>
            <span>{fmt(distanceDone)} с начала</span>
            <span>{progressPct.toFixed(0)}%</span>
          </div>
          {goalReached && (
            <div className="text-xs text-center py-1" style={{ color: C.profit }}>
              🎯 Цель достигнута
            </div>
          )}
        </div>

        {/* DAILY LOSS LIMIT */}
        <div
          className="flex flex-col gap-2 p-3"
          style={{
            background: C.panel,
            border: `1px solid ${locked ? C.loss : C.line}`,
            borderRadius: 2,
          }}
        >
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-1 text-xs uppercase tracking-widest" style={{ color: C.inkMute }}>
              <span>День {day}</span>
            </div>
            <button
              onClick={newDay}
              className="text-xs px-2 py-1"
              style={{ border: `1px solid ${C.line}`, color: C.inkMute, borderRadius: 2 }}
            >
              Новый день
            </button>
          </div>
          <div className="flex items-end justify-between">
            <div>
              <div className="text-xs" style={{ color: C.inkMute }}>
                P&amp;L за день
              </div>
              <div className="text-lg font-semibold" style={{ color: dailyPnl >= 0 ? C.profit : C.loss }}>
                {dailyPnl >= 0 ? "+" : ""}
                {fmt(dailyPnl)}
              </div>
            </div>
            <div className="text-right">
              <div className="text-xs" style={{ color: C.inkMute }}>
                лимит {fmtPct(settings.maxDailyLossPct)}
              </div>
              <div className="text-sm" style={{ color: locked ? C.loss : C.ink }}>
                {fmtPct(dailyLossPct)} использовано
              </div>
            </div>
          </div>
          <div className="h-1.5 w-full" style={{ background: C.panel2, border: `1px solid ${C.line}` }}>
            <div
              className="h-full"
              style={{
                width: `${Math.min(100, (dailyLossPct / settings.maxDailyLossPct) * 100)}%`,
                background: locked ? C.loss : C.heat,
              }}
            />
          </div>
          {locked && (
            <div
              className="flex items-center gap-2 text-xs p-2"
              style={{ background: C.lossDim, color: C.loss, border: `1px solid ${C.loss}` }}
            >
              <span>🔒</span>
              <span>Лимит достигнут — сделки заблокированы до нового дня.</span>
            </div>
          )}
        </div>

        {/* NEXT RISK */}
        <div
          className="flex flex-col gap-2 p-3"
          style={{
            background: C.panel,
            border: `1px solid ${escalated ? C.heat : C.line}`,
            borderRadius: 2,
          }}
        >
          <div className="text-xs uppercase tracking-widest" style={{ color: C.inkMute }}>
            Следующий риск
          </div>
          <div className="flex items-baseline gap-2">
            <div className="text-3xl font-bold" style={{ color: escalated ? C.heat : C.ink }}>
              {fmt(currentRiskAmt)}
            </div>
            <div className="text-sm" style={{ color: C.inkMute }}>
              {fmtPct(currentRiskPct)} · {escalated ? "разгон" : "база"}
            </div>
          </div>
          <div className="flex items-center gap-2">
            <span style={{ fontSize: 14 }}>🔥</span>
            <div className="flex gap-1">
              {Array.from({ length: settings.streakThreshold }).map((_, i) => (
                <span
                  key={i}
                  className="w-3 h-3"
                  style={{
                    background: i < winStreak ? C.profit : C.panel2,
                    border: `1px solid ${C.line}`,
                  }}
                />
              ))}
            </div>
            <span className="text-xs" style={{ color: C.inkMute }}>
              серия {winStreak}
            </span>
          </div>
        </div>

        {/* ACTION BUTTONS */}
        <div className="grid grid-cols-2 gap-2">
          <button
            onClick={() => logTrade(true)}
            disabled={locked}
            className="py-3 text-sm font-semibold uppercase tracking-wide"
            style={{
              background: C.profitDim,
              color: C.profit,
              border: `1px solid ${C.profit}`,
              borderRadius: 2,
              opacity: locked ? 0.4 : 1,
            }}
          >
            Прибыль +{settings.rrMultiple}R
          </button>
          <button
            onClick={() => logTrade(false)}
            disabled={locked}
            className="py-3 text-sm font-semibold uppercase tracking-wide"
            style={{
              background: C.lossDim,
              color: C.loss,
              border: `1px solid ${C.loss}`,
              borderRadius: 2,
              opacity: locked ? 0.4 : 1,
            }}
          >
            Убыток −1R
          </button>
        </div>

        <div className="flex gap-2">
          <button
            onClick={undoLast}
            disabled={history.length === 0}
            className="flex-1 flex items-center justify-center gap-1 text-xs py-2"
            style={{
              border: `1px solid ${C.line}`,
              color: history.length === 0 ? C.inkMute : C.ink,
              opacity: history.length === 0 ? 0.5 : 1,
              borderRadius: 2,
            }}
          >
            <span>↩ Отменить последнюю</span>
          </button>
          <button
            onClick={resetProgress}
            className="flex-1 flex items-center justify-center gap-1 text-xs py-2"
            style={{ border: `1px solid ${C.line}`, color: C.inkMute, borderRadius: 2 }}
          >
            <span>↺ Сбросить прогресс</span>
          </button>
        </div>

        {/* STATS */}
        <div
          className="flex flex-col gap-2 p-3"
          style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 2 }}
        >
          <div className="flex items-center gap-1 text-xs uppercase tracking-widest" style={{ color: C.inkMute }}>
            <span>Статистика и темп</span>
          </div>
          <div className="grid grid-cols-2 gap-2">
            <div>
              <div className="text-xs" style={{ color: C.inkMute }}>
                Сделок
              </div>
              <div className="text-sm font-semibold">{stats.total}</div>
            </div>
            <div>
              <div className="text-xs" style={{ color: C.inkMute }}>
                Винrate
              </div>
              <div className="text-sm font-semibold">{stats.winRate.toFixed(0)}%</div>
            </div>
            <div>
              <div className="text-xs" style={{ color: C.inkMute }}>
                Среднее/сделку
              </div>
              <div className="text-sm font-semibold" style={{ color: stats.expectancy >= 0 ? C.profit : C.loss }}>
                {stats.expectancy >= 0 ? "+" : ""}
                {fmt(stats.expectancy)}
              </div>
            </div>
            <div>
              <div className="text-xs" style={{ color: C.inkMute }}>
                Темп
              </div>
              <div className="text-sm font-semibold">{stats.tradesPerDay.toFixed(1)}/день</div>
            </div>
          </div>
          <div
            className="text-xs px-2 py-1.5"
            style={{ background: C.panel2, color: C.heat, border: `1px solid ${C.line}` }}
          >
            До цели: {stats.forecast}
          </div>
        </div>

        {/* TPO-STYLE TAPE */}
        <div className="flex flex-col gap-1">
          <div className="text-xs uppercase tracking-widest" style={{ color: C.inkMute }}>
            Лента сделок
          </div>
          <div
            className="flex gap-1 overflow-x-auto p-2"
            style={{ background: C.panel, border: `1px solid ${C.line}` }}
          >
            {tape.length === 0 ? (
              <span className="text-xs" style={{ color: C.inkMute }}>
                сделок пока нет
              </span>
            ) : (
              tape.map((t) => (
                <div
                  key={t.n}
                  className="flex flex-col items-center justify-center w-7 h-9 flex-shrink-0 text-xs font-bold"
                  style={{
                    background: t.result === "W" ? C.profitDim : C.lossDim,
                    color: t.result === "W" ? C.profit : C.loss,
                    border: `1px solid ${t.result === "W" ? C.profit : C.loss}`,
                  }}
                >
                  <span style={{ fontSize: 9, opacity: 0.7 }}>{t.n}</span>
                  {t.result}
                </div>
              ))
            )}
          </div>
        </div>

        {/* JOURNAL */}
        <div className="flex flex-col gap-1">
          <div className="text-xs uppercase tracking-widest" style={{ color: C.inkMute }}>
            Журнал
          </div>
          <div
            className="flex flex-col max-h-64 overflow-y-auto"
            style={{ border: `1px solid ${C.line}` }}
          >
            {tape.length === 0 ? (
              <div className="text-xs p-3" style={{ color: C.inkMute }}>
                Нажми «Прибыль» или «Убыток», когда закроешь позицию.
              </div>
            ) : (
              tape.map((t, idx) => (
                <div
                  key={t.n}
                  className="flex justify-between items-center px-2 py-1.5 text-xs"
                  style={{
                    background: idx % 2 === 0 ? C.panel : C.panel2,
                    borderBottom: `1px solid ${C.line}`,
                  }}
                >
                  <span style={{ color: C.inkMute }}>#{t.n}</span>
                  <span style={{ color: C.inkMute }}>риск {fmt(t.riskAmt)}</span>
                  <span style={{ color: t.pnl >= 0 ? C.profit : C.loss }}>
                    {t.pnl >= 0 ? "+" : ""}
                    {fmt(t.pnl)}
                  </span>
                  <span>{fmt(t.balanceAfter)}</span>
                </div>
              ))
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<RiskCalculator />);
</script>
</body>
</html>
